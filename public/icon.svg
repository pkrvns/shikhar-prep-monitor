<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded-square iOS-style background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle highlight on top half for depth -->
  <rect width="512" height="256" rx="112" fill="#ffffff" fill-opacity="0.06"/>

  <!-- Graduation cap (mortarboard) -->
  <g filter="url(#shadow)" transform="translate(0,4)">
    <!-- Mortarboard top (square diamond) -->
    <path d="M256 130 L420 196 L256 262 L92 196 Z" fill="url(#cap)"/>
    <!-- Mortarboard band -->
    <path d="M148 220 L148 282 Q148 320 256 320 Q364 320 364 282 L364 220 L256 264 Z" fill="#e0e7ff"/>
    <!-- Tassel hanging from right corner of mortarboard -->
    <line x1="420" y1="196" x2="420" y2="244" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
    <circle cx="420" cy="252" r="10" fill="#fbbf24"/>
  </g>

  <!-- Big S letter under the cap -->
  <text x="256" y="450"
        font-family="-apple-system, system-ui, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="148" font-weight="900" text-anchor="middle"
        fill="#ffffff" letter-spacing="-4">S</text>
</svg>
