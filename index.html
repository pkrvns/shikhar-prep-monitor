<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA theme -->
    <meta name="theme-color" content="#4f46e5" />
    <meta name="background-color" content="#f8fafc" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shikhar" />
    <!-- Canonical (modern iPhone / iOS picks this if no size matches) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Per-device sizes so iOS picks the sharpest match -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120.png" />

    <!-- Android / General -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Shikhar" />
    <meta name="description" content="28-week CBSE Class 12 board exam preparation tracker for Shikhar" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <title>Shikhar Prep Monitor</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
